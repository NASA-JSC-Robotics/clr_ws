launch:

  - arg:
      name: use_sim_time
      default: "true"

  # Include a custom RViz config
  - node:
        pkg: rviz2
        exec: rviz2
        name: rviz2
        args: "-d $(find-pkg-share clr_roboplan_demos)/config/clr_oink_config.rviz"
        param:
        - name: use_sim_time
          value: $(var use_sim_time)

  # IK planning and execution node
  - node:
      pkg: clr_roboplan_demos
      exec: chonkur_oink_streaming_node.py
      param:
        - name: use_sim_time
          value: $(var use_sim_time)
      output: screen
