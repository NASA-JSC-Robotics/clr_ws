---
workflow:
  rules:
    # Always run on tagged commits
    - if: $CI_COMMIT_TAG
      when: always
    # Run for merge requests
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: always
    # Run for commits to protected/standard development branches
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "humble" || $CI_COMMIT_BRANCH == "jazzy" || $CI_COMMIT_BRANCH =~ /.*-devel$/'
      when: always
    - when: never

stages:
  - lint
  - setup
  - build
  - test

variables:
  GIT_SUBMODULE_STRATEGY: recursive
  GIT_SUBMODULE_FORCE_HTTPS: "true"

# Run pre-commit hooks
pre-commit-check:
  stage: lint
  image: python:3.10
  before_script:
    - pip install pre-commit
  script:
    - pre-commit install --install-hooks
    - pre-commit run --all-files
  rules:
    - if: $CI_MERGE_REQUEST_ID
      when: always
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "humble" || $CI_COMMIT_BRANCH == "jazzy" || $CI_COMMIT_BRANCH =~ /.*-devel$/'
      when: always
    - when: never

# Tag the image based on either tag or branch names, depending on the run
set-tag:
  stage: setup
  script:
    - if [ -n "${CI_COMMIT_TAG}" ]; then
        echo "CONTAINER_TAG=${CI_COMMIT_TAG}" | tee -a build.env;
      else
        echo "CONTAINER_TAG=${CI_COMMIT_REF_SLUG}" | tee -a build.env;
      fi
  artifacts:
    reports:
      dotenv: build.env

# Build the source image and push to the GitLab registry
build_dev_source:
  stage: build
  dependencies:
    - set-tag
  image:
    name: ${CI_REGISTRY}/ci_build/docker_with_nasa_certs:latest
  before_script:
    - docker info
    - docker login -u gitlab-ci-token -p ${CI_JOB_TOKEN} ${CI_REGISTRY}
  script:
    - DOCKER_BUILDKIT=1 docker build
            --pull
            --cache-from ${CI_REGISTRY_IMAGE}:${CONTAINER_TAG}
            -t ${CI_REGISTRY_IMAGE}:${CONTAINER_TAG}
            --load
            --target er4-dev-source
            --file Dockerfile
            .
    - docker push --all-tags ${CI_REGISTRY_IMAGE}
  tags:
    - dind

run_tests:
  stage: test
  image:
    name: ${CI_REGISTRY}/ci_build/docker_with_nasa_certs:latest
  dependencies:
    - set-tag
    - build_dev_source
  before_script:
    - docker info
    - docker login -u gitlab-ci-token -p ${CI_JOB_TOKEN} ${CI_REGISTRY}
  script:
    # TODO: Fix tests for broken packages
    - |
      docker run --rm \
        ${CI_REGISTRY_IMAGE}:${CONTAINER_TAG} \
        bash -c "
          # Execute from the user workspace.
          pushd ${ER4_WS} > /dev/null
          # Run tests, modify as needed.
          colcon test
          # Gives you easy to read summary in CI build, returns 1 in case of failures so this should
          # fail the CI job if there are issues.
          colcon test-result --verbose
        "
  after_script:
    # Always clean up after ourselves
    - docker image rm --force ${CI_REGISTRY_IMAGE}:${CONTAINER_TAG} || true
  tags:
    - dind
