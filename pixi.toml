[workspace]
# Update the workspace name accordingly
name = "ros_docker_ws"
authors = ["Erik Holum <erik.holum@nasa.gov>"]
channels = [
  "https://prefix.dev/conda-forge",
  "https://prefix.dev/robostack-jazzy",
]
platforms = ["linux-aarch64", "linux-64"]
version = "0.1.0"
preview = ["pixi-build"]

[activation.env]
CMAKE_INSTALL_MODE = "SYMLINK"
COLCON_DEFAULT_OUTPUT_STYLE = "catkin_tools"
LIBRARY_PATH = "${CONDA_PREFIX}/lib:${LIBRARY_PATH}"
LD_LIBRARY_PATH = "${CONDA_PREFIX}/lib:${LD_LIBRARY_PATH}"
LDFLAGS = "-L${CONDA_PREFIX}/lib -Wl,-rpath,${CONDA_PREFIX}/lib -fuse-ld=mold"
RCUTILS_COLORIZED_OUTPUT = "1"

[tasks]
# Setup tasks
setup-colcon = { cmd = """
colcon mixin add default https://raw.githubusercontent.com/colcon/colcon-mixin-repository/master/index.yaml && \
colcon mixin update default
""" }

# Build tasks
build = "colcon build"
clean = "rm -rf build install log .pixi"
test = "colcon test"
test-result = "colcon test-result --verbose"

[dependencies]
python = ">=3.11,<3.13"
cmake = ">=4.1.2,<5"
ninja = ">=1.13.1,<2"
sccache = ">=0.11.0,<0.12"
mold = ">=2.40.2,<3"
colcon-common-extensions = ">=0.3.0,<0.4"
colcon-mixin = ">=0.2.3,<0.3"
pip = "*"

# Not necessary for building, but for tests/running in isolated environments
ros-jazzy-ros-base = "*"

[dev]
# Add path dependencies to any sources in the workspace
